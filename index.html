<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&family=Fira+Code:wght@500&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-color: #020204;
        --card-bg: rgba(12, 12, 18, 0.4);
        --accent-1: #9b7bff;
        --accent-2: #00d4ff;
        --accent-pink: #ff4dff;
        --discord: #5865F2;
        --glass-border: rgba(255, 255, 255, 0.08);
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); }
    ::-webkit-scrollbar-thumb { background: #1a1a26; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-2); }

    body {
        margin: 0;
        background: var(--bg-color);
        font-family: 'Rubik', sans-serif;
        color: white;
        overflow-x: hidden;
        padding-top: 150px;
        min-height: 100vh;
    }

    /* SCROLL PROGRESS INDICATOR */
    .scroll-progress {
        position: fixed;
        top: 0; left: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--accent-pink), var(--accent-1), var(--accent-2));
        width: 0%;
        z-index: 9999;
        box-shadow: 0 0 10px var(--accent-2);
        transition: width 0.1s ease-out;
    }

    /* CANVAS PARTICLE NETWORK */
    #particleCanvas {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        z-index: -2;
        pointer-events: none;
    }

    .ambient-glow {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 80vw; height: 80vh;
        background: radial-gradient(circle, rgba(155, 123, 255, 0.05) 0%, transparent 70%);
        z-index: -1; pointer-events: none;
    }

    /* ===================== */
    /* GLASSMORPHIC NAV      */
    /* ===================== */

    .navbar {
        position: fixed;
        top: 24px; left: 50%; transform: translateX(-50%);
        z-index: 999;
        width: 92%; max-width: 1250px; height: 76px; box-sizing: border-box;
        display: flex; justify-content: space-between; align-items: center;
        padding: 0 30px; border-radius: 100px;
        background: rgba(8, 8, 12, 0.5);
        backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .logo {
        font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
        background: linear-gradient(to right, #fff, var(--accent-pink), var(--accent-2), #fff);
        background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        animation: moveGradient 6s linear infinite;
        position: relative;
    }

    /* GLITCH EFFECT ON LOGO HOVER */
    .logo:hover { animation: glitch 0.2s linear infinite; }
    
    @keyframes glitch {
        0% { transform: translate(0) }
        20% { transform: translate(-2px, 2px) }
        40% { transform: translate(-2px, -2px) }
        60% { transform: translate(2px, 2px) }
        80% { transform: translate(2px, -2px) }
        100% { transform: translate(0) }
    }

    .right-nav { display: flex; align-items: center; gap: 14px; }

    .search-wrapper { position: relative; }
    .shortcut-hint {
        position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
        background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;
        font-family: 'Fira Code', monospace; font-size: 10px; color: #aaa; pointer-events: none;
    }

    #searchBar {
        width: 220px; height: 44px; padding: 0 45px 0 20px; border-radius: 100px;
        border: 1px solid var(--glass-border); background: rgba(0, 0, 0, 0.4);
        color: white; font-family: inherit; font-weight: 500; outline: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #searchBar:focus { width: 280px; border-color: var(--accent-2); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }

    .btn {
        height: 44px; padding: 0 24px; border-radius: 100px; display: flex; align-items: center;
        justify-content: center; text-decoration: none; font-weight: 700; font-size: 13px;
        transition: all 0.3s ease; cursor: pointer; border: none;
    }

    .theo-btn {
        background: linear-gradient(135deg, var(--accent-pink), var(--accent-1), var(--accent-2));
        background-size: 200%; color: white; box-shadow: 0 4px 15px rgba(155, 123, 255, 0.25);
    }
    .theo-btn:hover { background-position: 100%; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(155, 123, 255, 0.45); }

    /* ===================== */
    /* FILTER & STATS HUB    */
    /* ===================== */

    .stats-panel {
        width: min(960px, 95vw);
        display: flex; gap: 20px; margin-bottom: 20px;
    }

    .stat-box {
        flex: 1; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--glass-border);
        border-radius: 20px; padding: 20px 24px; backdrop-filter: blur(10px);
        position: relative; overflow: hidden;
    }
    .stat-box::before {
        content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
        background: var(--accent-1);
    }
    .stat-box:nth-child(2)::before { background: var(--accent-2); }

    .stat-label { font-size: 11px; text-transform: uppercase; color: #888; font-weight: 700; letter-spacing: 1.5px; }
    .stat-value { font-size: 28px; font-weight: 900; color: #fff; margin-top: 6px; }

    .active-filters {
        width: min(960px, 95vw); display: flex; gap: 10px; margin-bottom: 20px; align-items: center;
    }
    .clear-filter {
        font-size: 12px; color: var(--accent-pink); cursor: pointer; font-weight: 700; text-transform: uppercase; display: none;
    }
    .clear-filter:hover { text-decoration: underline; }

    /* ===================== */
    /* 3D KINETIC CARDS      */
    /* ===================== */

    .container { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 0 20px 80px 20px; gap: 30px; box-sizing: border-box; perspective: 1500px; }

    .card-wrapper {
        width: min(960px, 95vw);
        height: 260px;
        transform-style: preserve-3d;
        transition: transform 0.1s; /* Smooth hardware acceleration */
    }

    .card {
        width: 100%; height: 100%; display: flex; border-radius: 26px; overflow: hidden;
        background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
        box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative;
        transform: translateZ(0); /* Anchor for 3D */
    }

    .card::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(125deg, rgba(255,255,255,0.1) 0%, transparent 40%);
        z-index: 5; pointer-events: none; mix-blend-mode: overlay;
    }

    .left { width: 40%; height: 100%; position: relative; cursor: pointer; background: #000; overflow: hidden; flex-shrink: 0; }
    .left img, .right img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); filter: brightness(0.8); }
    .card-wrapper:hover .left img, .card-wrapper:hover .right img { transform: scale(1.08); filter: brightness(1); }
    .left iframe { width: 100%; height: 100%; border: none; }

    .right { width: 60%; height: 100%; position: relative; overflow: hidden; }
    
    .card-ui-layer {
        position: absolute; inset: 0; z-index: 2;
        background: linear-gradient(to right, rgba(2,2,4,1) 0%, rgba(2,2,4,0.85) 50%, rgba(2,2,4,0.3) 100%);
        padding: 28px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between;
        transform: translateZ(30px); /* Pops out in 3D */
    }

    /* DATA METRICS STRIP */
    .tech-metrics {
        display: flex; gap: 16px; margin-top: 12px;
        font-family: 'Fira Code', monospace; font-size: 11px; color: #00d4ff;
        background: rgba(0, 212, 255, 0.05); padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(0, 212, 255, 0.1);
        width: fit-content;
    }
    .metric span { color: #fff; font-weight: 700; margin-left: 4px; }

    .ui-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; }
    .title-wrapper { display: flex; align-items: center; gap: 12px; }
    
    .rank-badge {
        background: linear-gradient(135deg, var(--accent-1), var(--accent-pink));
        color: white; padding: 4px 14px; border-radius: 10px; font-weight: 900; font-size: 16px;
        box-shadow: 0 5px 15px rgba(155, 123, 255, 0.4);
    }
    
    .title { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    
    .sub { font-size: 14px; color: #b3b3b3; margin-top: 8px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .sub b { color: #fff; }

    .id-copy {
        cursor: pointer; padding: 2px 8px; border-radius: 6px; background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2); transition: all 0.2s; font-family: 'Fira Code', monospace; font-size: 12px;
    }
    .id-copy:hover { background: var(--accent-1); color: #fff; border-color: var(--accent-1); }

    .tags-container { display: flex; gap: 6px; margin-top: 12px; }
    .tag {
        font-size: 10px; font-weight: 900; text-transform: uppercase; padding: 4px 10px; border-radius: 8px;
        background: rgba(155, 123, 255, 0.15); color: var(--accent-1); border: 1px solid rgba(155, 123, 255, 0.3);
        cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
    }
    .tag:hover, .tag.active { background: var(--accent-1); color: white; box-shadow: 0 0 15px var(--accent-1); }
    .tag.cyan { background: rgba(0, 212, 255, 0.15); color: var(--accent-2); border-color: rgba(0, 212, 255, 0.3); }
    .tag.cyan:hover, .tag.cyan.active { background: var(--accent-2); color: white; box-shadow: 0 0 15px var(--accent-2); }
    
    .chance { font-weight: 900; font-size: 26px; color: var(--accent-2); text-shadow: 0 0 25px rgba(0, 212, 255, 0.5); transform: translateZ(40px); }

    .ui-bottom { display: flex; justify-content: flex-end; }
    .wr {
        padding: 10px 24px; border-radius: 12px; background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2); font-size: 14px; font-weight: 800; text-decoration: none; color: white;
        transition: all 0.3s; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(5px);
    }
    .wr:hover { background: white; color: black; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.2); }

    /* TOAST */
    .toast-container { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
    .toast {
        background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(10px); border-left: 4px solid var(--accent-2);
        color: white; padding: 14px 24px; border-radius: 8px; font-size: 14px; font-weight: 600;
        box-shadow: 0 10px 30px rgba(0,0,0,0.6); transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .toast.show { transform: translateX(0); }

    @media(max-width: 900px) {
        .navbar { flex-direction: column; height: auto; padding: 20px; border-radius: 24px; gap: 15px; top: 12px; width: 94%; }
        .right-nav { flex-wrap: wrap; justify-content: center; width: 100%; gap: 10px; }
        #searchBar { width: 100% !important; }
        .stats-panel { flex-direction: column; width: 94%; }
        .card-wrapper { flex-direction: column; height: auto; width: 94vw; transform: none !important; transition: none; }
        .card { flex-direction: column; height: auto; }
        .left { width: 100%; height: 200px; }
        .right { width: 100%; height: auto; }
        .card-ui-layer { position: relative; padding: 20px; background: #09090e; gap: 20px; transform: none; }
        .ui-top { flex-direction: column; gap: 12px; }
        .chance { align-self: flex-start; font-size: 22px; transform: none; }
        body { padding-top: 260px; }
        #particleCanvas { display: none; } /* Save mobile battery */
    }
</style>
</head>

<body>

<div class="scroll-progress" id="progressBar"></div>
<canvas id="particleCanvas"></canvas>
<div class="ambient-glow"></div>

<div class="toast-container" id="toastBox"></div>

<div class="navbar">
    <div class="logo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">Luck Based List</div>
    <div class="right-nav">
        <div class="search-wrapper">
            <input type="text" id="searchBar" placeholder="Search data...">
            <div class="shortcut-hint">/</div>
        </div>
        <a class="btn theo-btn" href="YOUR_LINK_HERE" target="_blank">Theoretically Possible</a>
    </div>
</div>

<div class="container">
    <div class="stats-panel">
        <div class="stat-box">
            <div class="stat-label">System Registry</div>
            <div class="stat-value" id="statTotal">0 Entries</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Pinnacle Anomaly</div>
            <div class="stat-value" id="statHardest">Analyzing...</div>
        </div>
    </div>

    <div class="active-filters">
        <span style="font-size: 12px; color: #888; font-weight: 700; text-transform: uppercase;">Active Filter:</span>
        <div id="currentFilterDisplay" style="font-weight: 900; color: #fff;">None</div>
        <div class="clear-filter" id="clearFilterBtn" onclick="setGlobalTag(null)">[ Clear ]</div>
    </div>

    <div id="container" style="width:100%; display:flex; flex-direction:column; align-items:center; gap:30px;"></div>
</div>

<script>
// ==========================================
// BACKGROUND PARTICLE ENGINE
// ==========================================
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let isMobile = window.innerWidth <= 900;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    isMobile = window.innerWidth <= 900;
}
window.addEventListener('resize', resize);
resize();

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.size = Math.random() * 2;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        if(this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
    }
    draw() {
        ctx.fillStyle = 'rgba(155, 123, 255, 0.5)';
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
    }
}

for(let i = 0; i < 70; i++) particles.push(new Particle());

function animateParticles() {
    if(isMobile) return; // Halt on mobile for performance
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    for(let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
        
        for(let j = i; j < particles.length; j++) {
            let dx = particles[i].x - particles[j].x;
            let dy = particles[i].y - particles[j].y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if(dist < 120) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(0, 212, 255, ${0.15 - dist/800})`;
                ctx.lineWidth = 1;
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }
    requestAnimationFrame(animateParticles);
}
animateParticles();

// ==========================================
// CORE UI & LOGIC
// ==========================================
const progressBar = document.getElementById('progressBar');
const searchBar = document.getElementById('searchBar');
const clearFilterBtn = document.getElementById('clearFilterBtn');
const currentFilterDisplay = document.getElementById('currentFilterDisplay');
let levelsData = [];
let activeTagFilter = null;

// Keyboard Shortcut
document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement !== searchBar) {
        e.preventDefault();
        searchBar.focus();
    }
});

// Scroll Progress Bar
window.addEventListener('scroll', () => {
    let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
    let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    progressBar.style.width = (winScroll / height) * 100 + "%";
});

// Toast System
window.showToast = function(msg) {
    let t = document.createElement('div'); t.className = 'toast'; t.innerHTML = msg;
    document.getElementById('toastBox').appendChild(t);
    setTimeout(() => t.classList.add('show'), 10);
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3000);
}

window.copyID = function(id) {
    navigator.clipboard.writeText(id).then(() => showToast(`Successfully copied ID: <b style="color:var(--accent-2)">${id}</b>`));
}

window.setGlobalTag = function(tag) {
    activeTagFilter = activeTagFilter === tag ? null : tag; // Toggle logic
    currentFilterDisplay.innerText = activeTagFilter ? activeTagFilter : "None";
    clearFilterBtn.style.display = activeTagFilter ? "block" : "none";
    processPipeline();
}

function apply3DPhysics(wrapper) {
    if (isMobile) return;
    const card = wrapper.querySelector('.card');
    
    wrapper.addEventListener('mousemove', (e) => {
        const rect = wrapper.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        
        // Calculate rotation limits (max 8 degrees)
        const rotateX = ((y - centerY) / centerY) * -8;
        const rotateY = ((x - centerX) / centerX) * 8;
        
        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
    });

    wrapper.addEventListener('mouseleave', () => {
        card.style.transform = `rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
    });
}

function render(data) {
    let container = document.getElementById("container");
    container.innerHTML = "";
    
    data.forEach((l, i) => {
        let wrapper = document.createElement("div");
        wrapper.className = "card-wrapper";
        wrapper.style.animation = `cardEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards ${i * 0.08}s`;

        let tagsHTML = l.tags ? l.tags.map(t => 
            `<div class="tag ${t==='Verified'?'cyan':''} ${t===activeTagFilter?'active':''}" onclick="setGlobalTag('${t}')">${t}</div>`
        ).join('') : "";

        // Fallbacks for extra metrics if JSON doesn't have them
        let objects = l.objects || "~40k";
        let length = l.length || "XL";

        wrapper.innerHTML = `
        <div class="card">
            <div class="left" onclick="playVideo(this, '${l.youtube}')">
                <img src="https://img.youtube.com/vi/${l.youtube}/hqdefault.jpg" alt="Thumb">
            </div>
            <div class="right">
                <img src="${l.gif}" alt="BG" style="position:absolute; inset:0; z-index:1;">
                <div class="card-ui-layer">
                    <div class="ui-top">
                        <div class="text-group">
                            <div class="title-wrapper">
                                <div class="rank-badge">#${l.place}</div>
                                <div class="title">${l.name}</div>
                            </div>
                            <div class="sub">By <b>${l.author}</b> • <span class="id-copy" onclick="copyID('${l.id}')">ID: ${l.id}</span></div>
                            
                            <div class="tech-metrics">
                                <div class="metric">OBJ: <span>${objects}</span></div>
                                <div class="metric">LEN: <span>${length}</span></div>
                            </div>

                            <div class="tags-container">${tagsHTML}</div>
                        </div>
                        <div class="chance">${l.chance}</div>
                    </div>
                    <div class="ui-bottom">
                        <a class="wr" href="${l.wrLink}" target="_blank">🏆 Verified by ${l.wrName}</a>
                    </div>
                </div>
            </div>
        </div>`;
        container.appendChild(wrapper);
        apply3DPhysics(wrapper);
    });
}

function processPipeline() {
    let query = searchBar.value.toLowerCase();
    let filtered = levelsData.filter(l =>
        (l.name.toLowerCase().includes(query) || l.author.toLowerCase().includes(query) || String(l.id).includes(query)) &&
        (activeTagFilter === null || (l.tags && l.tags.includes(activeTagFilter)))
    );
    filtered.sort((a,b) => a.place - b.place);
    render(filtered);
}

// Data Load Simulation
setTimeout(() => {
    levelsData = [
        { place: 1, name: "VSC", author: "BoBoBo", id: "666666", chance: "0.001%", tags: ["Extreme", "Timings"], objects: "21,504", length: "Short", youtube: "dQw4w9WgXcQ", gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3VwY2NmdXJvYmdkMDNnbW96ZHZ0b3E0bWN6ZnA1bWxpY3p6bXF6dyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7Tov7edZ6tTuOg8w/giphy.gif", wrLink: "#", wrName: "Paqeo" },
        { place: 2, name: "Tartarus", author: "Riot", id: "123456", chance: "0.052%", tags: ["Verified", "Frame Perfect"], objects: "94,120", length: "XL", youtube: "dQw4w9WgXcQ", gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM2VwYm81b3ZkM3JicnpqNDVhcWpxZnNwbTVvNXZpdXp0cHhrNDRxbyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/l0HlHFRbmaZtBRhXG/giphy.gif", wrLink: "#", wrName: "Mefewe" }
    ];
    document.getElementById("statTotal").innerText = `${levelsData.length} Entries`;
    document.getElementById("statHardest").innerText = levelsData[0].name;
    processPipeline();
}, 100);

searchBar.addEventListener("input", processPipeline);
</script>

</body>
</html>
