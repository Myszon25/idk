<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:black;
    font-family:'Rubik', sans-serif;
    color:white;
    overflow-x:hidden;
}

/* ===================== */
/*      NAVBAR           */
/* ===================== */

.navbar{
    position:sticky;
    top:0;
    z-index:999;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:14px 22px;

    background:rgba(10,10,10,0.65);
    backdrop-filter: blur(18px);

    border-bottom:1px solid rgba(255,255,255,0.12);

    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* logo */
.logo{
    font-size:26px;
    font-weight:800;

    background:linear-gradient(90deg,#fff,#9b7bff,#00d4ff,#fff);
    background-size:300%;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation: move 6s linear infinite;
}

@keyframes move{
    0%{background-position:0%;}
    100%{background-position:300%;}
}

.right-nav{
    display:flex;
    align-items:center;
    gap:12px;
}

/* search */
#searchBar{
    width:260px;
    padding:10px 14px;

    border-radius:12px;

    border:1px solid rgba(255,255,255,0.15);

    background:rgba(255,255,255,0.05);
    color:white;

    outline:none;

    transition:0.25s;
}

#searchBar:focus{
    width:290px;
    border-color:#9b7bff;
    box-shadow:0 0 15px rgba(155,123,255,0.35);
}

/* DISCORD */
.discord{
    display:flex;
    align-items:center;
    gap:8px;

    padding:10px 14px;

    border-radius:12px;

    background:#5865F2;

    color:white;
    text-decoration:none;

    font-weight:700;

    transition:0.25s;
}

.discord:hover{
    transform:translateY(-2px);
    box-shadow:0 0 20px rgba(88,101,242,0.5);
}

/* NEW BUTTON */
.theo-btn{
    padding:10px 14px;

    border-radius:12px;

    background:linear-gradient(135deg,#ff4dff,#7b5cff,#00d4ff);
    background-size:200%;

    color:white;
    text-decoration:none;

    font-weight:800;
    font-size:13px;

    transition:0.25s;

    white-space:nowrap;
}

.theo-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 25px rgba(123,92,255,0.6);
    background-position:100%;
}

/* MOBILE */
@media(max-width:700px){

    .navbar{
        flex-direction:column;
        gap:10px;
    }

    #searchBar{
        width:200px;
    }

    .logo{
        font-size:22px;
    }
}

/* ===================== */
/* RESZTA STRONY         */
/* ===================== */

.container{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    gap:15px;
}

.card{
    width: min(900px, 95vw);
    height: 220px;

    display:flex;
    border-radius:18px;
    overflow:hidden;

    border:2px solid white;
    background:#0a0a0a;

    position:relative;
}

.left{ width:35%; height:100%; }
.left img{ width:100%; height:100%; object-fit:cover; }

.right{ width:65%; height:100%; }
.right img{ width:100%; height:100%; object-fit:cover; }

.info{
    position:absolute;
    top:10px;
    left:10px;
}

.title{
    font-size:20px;
    font-weight:800;
}

.sub{
    font-size:12px;
    opacity:0.8;
}

.chance{
    position:absolute;
    top:10px;
    right:10px;
    font-weight:800;
}

.wr{
    position:absolute;
    bottom:10px;
    right:10px;

    padding:5px 10px;
    border-radius:12px;

    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.5);

    font-size:12px;
    text-decoration:none;
    color:white;
}

</style>
</head>

<body>

<div class="navbar">

    <div class="logo">
        Luck Based Level List
    </div>

    <div class="right-nav">

        <input type="text" id="searchBar" placeholder="Search level...">

        <!-- NEW BUTTON -->
        <a class="theo-btn" href="YOUR_LINK_HERE" target="_blank">
            Theorically Possible
        </a>

        <a class="discord" href="YOUR_DISCORD_LINK" target="_blank">
            Discord
        </a>

    </div>

</div>

<div class="container" id="container"></div>

<script>

let container = document.getElementById("container");
let searchBar = document.getElementById("searchBar");

let levelsData = [];

function render(data){

    container.innerHTML = "";

    data.forEach(l=>{

        let card = document.createElement("div");
        card.className="card";

        card.innerHTML=`
        <div class="left">
            <img src="https://img.youtube.com/vi/${l.youtube}/hqdefault.jpg">
        </div>

        <div class="right">
            <img src="${l.gif}">
        </div>

        <div class="info">
            <div class="title">#${l.place} ${l.name}</div>
            <div class="sub">by ${l.author}<br>id: ${l.id}</div>
        </div>

        <div class="chance">${l.chance}</div>

        <a class="wr" href="${l.wrLink}" target="_blank">
            ${l.wrName}
        </a>
        `;

        container.appendChild(card);
    });
}

fetch("levels.json")
.then(r=>r.json())
.then(data=>{
    levelsData = data.sort((a,b)=>a.place-b.place);
    render(levelsData);
});

searchBar.addEventListener("input",()=>{
    let v = searchBar.value.toLowerCase();

    let filtered = levelsData.filter(l=>
        l.name.toLowerCase().includes(v) ||
        l.author.toLowerCase().includes(v) ||
        String(l.id).includes(v)
    );

    render(filtered);
});

</script>

</body>
</html>
